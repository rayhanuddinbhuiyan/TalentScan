# ===================================
# Application Info
# ===================================
spring.application.name=AI-Resume-Screening-System
server.port=8080

# ===================================
# Database Configuration (MySQL)
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/resume_screening_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / Hibernate Configuration
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================
# JWT Configuration
# ===================================
jwt.secret=your_super_secret_key_here_must_be_at_least_256_bits_long_for_HS256
jwt.expiration=86400000

# ===================================
# Logging
# ===================================
logging.level.com.resumescreening=DEBUG
logging.level.org.springframework.security=INFO
